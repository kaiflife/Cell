<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="description" content="" />
	<title>Constructor</title>
	<style>
		body {
			margin: 0;
			padding: 0;
		}

		.menuModal {
			display: none;
			position: fixed;
			flex-direction: column;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;

			&.show {
				display: flex;
			}

			.header {
				display: flex;
				width: 100vw;
				height: 32px;
				overflow-x: auto;

				div {
					color: red;

					&::before {
						content: "/";
					}
				}
			}

			.main {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 32px);
				overflow-y: auto;
			}
		}

		header {
			height: 32px;
		}

		main {
			height: calc(100vh - 32px);
			width: 100vw;
			position: relative;
		}

		.editMode {
			.cell {
				border: 1px solid black;

				&.selected {
					border-color: red;
				}
			}
		}

		.level {
			width: 32px;
		}
	</style>
</head>

<body>
	<div id="menuModal" class="menuModal">
		<div class="header" id="menuModalHeader"></div>
		<div class="main" id="menuModalMain"></div>
	</div>
	<main id="main"></main>
	<footer>
		<button onclick="openMenuModal()">Menu</button>
	</footer>

	<script>
		menuPathList = [];
		mainIdsList = [];
		maxDiff = 1;
		maxId = 1;
		CREATE_ELS_NAMES_LIST = ["div", "span", "p", "input", "button"];
		ROUTE_ACTIONS = {
			"/menu": menuF,
			"/menu/create": menuCreateF,
			"/menu/edit": menuEditF,
			"/menu/edit/:id": menuEditIdF,
		};
		clickedElName = "";

		function getMenuPath() {
			return `/${menuPathList.join("/")}`;
		}

		// Функция для скачивания HTML-кода страницы
		function downloadHTML() {
			// Получаем весь HTML-код страницы
			const htmlContent = document.documentElement.outerHTML;

			// Создаем Blob объект с HTML-содержимым
			const blob = new Blob([htmlContent], {
				type: 'text/html;charset=utf-8'
			});

			// Создаем URL для скачивания
			const url = URL.createObjectURL(blob);

			// Создаем скрытый элемент для скачивания
			const a = document.createElement('a');
			a.style.display = 'none';
			a.href = url;

			// Задаем имя файла
			a.download = 'page.html';

			// Добавляем элемент в документ
			document.body.appendChild(a);

			// Эмулируем клик по ссылке
			a.click();

			// Очищаем URL после скачивания
			window.URL.revokeObjectURL(url);

			// Удаляем элемент из DOM
			document.body.removeChild(a);
		}

			const selectedId = menuPathList.at(-1);
			const selectedEl = window[selectedId];

			const menuEditIdTopInputEl = createEl({
				appendTo: menuModalMain,
				tag: "input",
				props: { type: "number" },
				listeners: [
					{
						eventName: "input",
						callback: () => {
							menuEditIdTopInputRangeEl.value = event.target.value;
							selectedEl.style.top = `${menuEditIdTopInputRangeEl.value}px`;
						},
					},
				],
			});

			const menuEditIdTopInputRangeEl = createEl({
				appendTo: menuModalMain,
				tag: "input",
				listeners: [
					{
						eventName: "input",
						callback: () => {
							menuEditIdTopInputEl.value = event.target.value;
							selectedEl.style.top = `${menuEditIdTopInputRangeEl.value}px`;
						},
					},
				],
				props: { type: "range", min: 0, max: main.clientHeight },
			});

			const menuEditIdLeftInputEl = createEl({
				appendTo: menuModalMain,
				tag: "input",
				props: { type: "number" },
				listeners: [
					{
						eventName: "input",
						callback: () => {
							menuEditIdLeftInputRangeEl.value = event.target.value;
							selectedEl.style.left = `${menuEditIdLeftInputRangeEl.value}px`;
						},
					},
				],
			});

			const menuEditIdLeftInputRangeEl = createEl({
				appendTo: menuModalMain,
				tag: "input",
				listeners: [
					{
						eventName: "input",
						callback: () => {
							menuEditIdLeftInputEl.value = event.target.value;
							selectedEl.style.left = `${menuEditIdLeftInputRangeEl.value}px`;
						},
					},
				],
				props: { type: "range", min: 0, max: main.clientWidth },
			});
		}

		function menuEditF() {
			const menuEditSearchEl = createEl({
				tag: "input",
			});

			menuEditSearchEl.addEventListener("input", () => {
				mainIdsList.filter((id) => {
					const idEl = menuModalMain.querySelector(`[data-menu-edit-el-id="${id}"]`);
					const hasFoundEl = id.includes(menuEditSearchEl.value);

					if (!hasFoundEl && idEl.dataset.selected) {
						delete idEl.dataset.selected;
						idEl.setAttribute("style", "display: none;");
					} else if (hasFoundEl) {
						idEl.setAttribute("style", "");
					}
				});
			});

			const selectEditElAction = (event) => {
				const elId = event.target.dataset.id;

				if (elId) {
					menuModalMain.querySelector(`[data-menuEditElId="${clickedElName}"]`).backgroundColor = "";

					clickedElName = elId;

					event.target.style.backgroundColor = "gray";
				}
			};

			menuModalMain.addEventListener("click", selectEditElAction);

			const menuEditFragment = getFragment();

			menuEditFragment.append(menuEditSearchEl);

			mainIdsList.forEach((id) => {
				menuEditFragment.append(
					createEl({
						tag: "p",
						datasets: [{ name: "menuEditElId", value: id }],
						props: {
							textContent: id,
							onclick: (event) => {
								const prevEl =
									event.target.parentElement.querySelector('[data-selected="selected"]');

								if (prevEl) {
									prevEl.setAttribute("style", "");
									delete prevEl.dataset.selected;
								}

								event.target.setAttribute("style", "background-color: gray;color:white;");
								event.target.dataset.selected = "selected";
							},
						},
					})
				);
			});

			menuEditFragment.append(
				createEl({
					tag: "button",
					props: {
						textContent: "Edit",
						onclick: () => {
							const selectedEl = menuModalMain.querySelector('[data-selected="selected"]');

							if (!selectedEl) return;

							const selectedId = selectedEl.dataset.menuEditElId;

							menuModalMain.removeEventListener("click", selectEditElAction);

							addMenuModalHeader(selectedId);
						},
					},
				})
			);

			menuModalMain.replaceChildren(menuEditFragment);
		}

		function menuCreateF() {
			const idInput = createEl({
				tag: "input",
				props: { id: "elIdInput" },
			});

			const createFragment = getFragment();

			createFragment.append(idInput);

			const onClickCreateEl = (event) => {
				if (!event.target.dataset.el) return;

				if (clickedElName) {
					menuModalMain.querySelector(`[data-el="${clickedElName}"]`).style.backgroundColor = "";
				}

				clickedElName = event.target.textContent;
				event.target.style.backgroundColor = "gray";
			};

			menuModalMain.addEventListener("click", onClickCreateEl);

			CREATE_ELS_NAMES_LIST.forEach((tag) => {
				createFragment.append(
					createEl({ datasets: [{ value: tag, name: "el" }], props: { innerHTML: tag } })
				);
			});

			createFragment.append(
				createEl({
					tag: "button",
					props: {
						textContent: "Create",
						onclick: () => {
							newId = elIdInput.value;

							if (newId && clickedElName && !mainIdsList.includes(newId)) {
								maxId += 1;
								createEl({
									tag: clickedElName,
									appendTo: "#main",
									props: {
										innerHTML: clickedElName,
										id: newId,
									},
									style: {
										"z-index": maxId,
										position: "absolute",
										top: 0,
										left: 0,
									},
								});
								mainIdsList.push(newId);
								menuModalMain.removeEventListener("click", onClickCreateEl);
								closeMenuModal();
							}
						},
					},
				})
			);

			menuModalMain.append(createFragment);
		}

		function getPx(value) {
			return `${parseFloat(value)}px`;
		}

		function closeMenuModal() {
			menuModal.classList.remove("show");
			menuPathList = [];
			menuModalHeader.replaceChildren();
			menuModalMain.replaceChildren();
		}

		function getFragment() {
			return document.createDocumentFragment();
		}

		function callNewRouteF(route, routeWithId) {
			const newRouteF = ROUTE_ACTIONS[route] ?? ROUTE_ACTIONS[`${routeWithId}/:id`];

			newRouteF();
		}

		function addMenuModalHeader(path) {
			const el = createEl({ props: { innerHTML: path } });

			if (!menuPathList.length) {
				button = createEl({
					props: { innerHTML: "back", onclick: removeLastMenuModalHeader },
					tag: "button",
				});
				menuModalHeader.append(button);
			}

			const prevRoute = getMenuPath();

			menuPathList.push(path);
			const newRoute = getMenuPath();

			menuModalHeader.append(el);

			menuModalMain.replaceChildren();

			callNewRouteF(newRoute, prevRoute);
		}

		function removeLastMenuModalHeader() {
			const prevRoute = getMenuPath();

			menuPathList.pop();

			const newRoute = getMenuPath();

			menuModalHeader.removeChild(menuModalHeader.lastElementChild);
			menuModalMain.replaceChildren();

			if (!menuPathList.length) {
				closeMenuModal();
			} else {
				callNewRouteF(newRoute, prevRoute);
			}
		}

		function getMenuSection({ section = {}, pathIndex = 1 }) {
			if (!section.routes) return section;

			const path = menuPathList[pathIndex];
			const isLastMenuPath = pathIndex === menuPathList.length - 1;

			if (isLastMenuPath) return section;

			const currentSection = section.sections.find((childrenSection) => compare(childrenSection.name, path));

			if (currentSection) {
				return getMenuSection({ section: currentSection, index: pathIndex + 1 });
			}
		}

		function menuF() {
			const mainButtons = getFragment();

			["create", "edit", "delete", "download"].forEach((buttonName) => {
				mainButtons.append(
					createEl({
						props: {
							innerHTML: buttonName,
							onclick: () => {
								if (buttonName === 'download') {
									closeMenuModal();
									downloadHTML()
								} else {
									addMenuModalHeader(buttonName);
								}
							},
						},
					})
				);
			});

			menuModalMain.append(mainButtons);

			menuModal.classList.add("show");
			menuModal.style.zIndex = maxId + 1;
		}

		function openMenuModal() {
			addMenuModalHeader("menu");
		}

		function getCellInfo(element) {
			info = {
				top: parseFloat(element.style.top),
				left: parseFloat(element.style.left),
				width: parseFloat(element.style.width),
				height: parseFloat(element.style.height),
			};

			return {
				...info,
				bottom: info.top + info.height,
				right: info.left + info.width,
				id: +element.id,
			};
		}

		function createEl({ tag = "div", datasets, style = {}, appendTo = "", props, listeners }) {
			const el = document.createElement(tag);

			if (listeners) {
				listeners.forEach(({ eventName, callback }) => el.addEventListener(eventName, callback));
			}
			if (datasets) datasets.forEach(({ value, name }) => (el.dataset[name] = value));
			if (style) {
				Object.keys(style).forEach((styleKey) => {
					el.style[styleKey] = style[styleKey];
				});
			}
			if (appendTo) {
				if (typeof appendTo === "string") {
					document.querySelector(appendTo).append(el);
				} else {
					appendTo.append(el);
				}
			}
			if (props) {
				Object.keys(props).forEach((propName) => {
					el[propName] = props[propName];
				});
			}
			return el;
		}

		function rangeArray({ from = 0, to = 0, before = "", handler }) {
			const newArray = [];
			for (let index = from; index <= to; index++) {
				let value = `${before}${index}`;
				handler?.(value, index);
				newArray.push(value);
			}
			return newArray;
		}

		function compare(id1, id2) {
			return String(id1) === String(id2);
		}

				console.log(arguments[i]);

		}

let framePromise = null;

const setStyleToEl = (style, el) => {
  if (!(el instanceof Element) || !style || typeof style !== 'object') {
    return Promise.resolve();
  }

  // Обновляем очередь задач для конкретного элемента
  const currentPending = styleQueue.get(el) || {};
  styleQueue.set(el, { ...currentPending, ...style });

  // Создаем один промис на весь кадр анимации
  if (!isScheduled) {
    isScheduled = true;
    framePromise = new Promise((resolve) => {
      requestAnimationFrame(() => {
        // Применяем все накопленные стили разом
        styleQueue.forEach((styles, element) => {
          Object.assign(element.style, styles);
        });
        
        styleQueue.clear();
        isScheduled = false;
        resolve(); // Сигнализируем о завершении записи в DOM
      });
    });
  }

  return framePromise;
};


const prepareClassNames = (classNames = []) => classNames.filter(Boolean).join(' ');

class CustomButton {
  static errorClass = 'error';
  static baseClass = 'custom-button';

  constructor({ text = '', className = '', onClick } = {}) {
    this.el = document.createElement('button');
    this._onClick = onClick; // Сохраняем ссылку для корректного удаления

    this.init(text, className);
  }

  init(text, className) {
    // Массовая установка классов и текста
    this.el.className = prepareClassNames([CustomButton.baseClass, className])
    this.el.textContent = text;

    if (typeof this._onClick === 'function') {
      this.el.addEventListener('click', this._onClick);
    }
  }

  // Геттер для удобного доступа
  get element() {
    return this.el;
  }

  // Метод управления состоянием ошибки
  setError(hasError) {
    this.el.classList.toggle(CustomButton.errorClass, !!hasError);
  }

  /**
   * Полная очистка ресурсов
   */
  destroy() {
    // 1. Удаляем обработчик события
    if (typeof this._onClick === 'function') {
      this.el.removeEventListener('click', this._onClick);
    }

    // 2. Удаляем элемент из DOM, если он там был
    this.el.remove();

    // 3. Зануляем ссылки для сборщика мусора (GC)
    this.el = null;
    this._onClick = null;
  }
}

class CustomLabel {
  static errorClass = 'custom-error';
  static className = 'custom-label';

  constructor({ label = '', isRequired = false } = {}) {
    this.el = document.createElement('span');
    this.baseText = `${label}${isRequired ? ' (Обязательное поле)' : ''}`;
    
    this.init();
  }

  init() {
    this.el.className = CustomLabel.className;
    this.el.textContent = this.baseText;
    // Используем скрытое свойство вместо dataset для скорости (нет парсинга строк)
    this.el._baseText = this.baseText; 
  }

  // Геттер для единообразия с кнопкой и модалкой
  get element() {
    return this.el;
  }

  /**
   * Оптимизированное управление ошибкой
   * @param {HTMLElement} containerEl - Контейнер, где лежит label
   * @param {Object} params - Текст ошибки или флаг состояния
   */
  static setError(containerEl, { errorText, hasError } = {}) {
    if (!(containerEl instanceof HTMLElement)) return;

    const labelEl = containerEl.querySelector(`.${CustomLabel.className}`);
    if (!labelEl) return;

    // 1. Определяем финальное состояние ошибки (Boolean)
    const shouldShowError = errorText !== undefined ? !!errorText : !!hasError;

    // 2. Атомарное обновление класса контейнера
    containerEl.classList.toggle(CustomLabel.errorClass, shouldShowError);

    // 3. Умное обновление текста (только если передали текст ошибки)
    if (errorText !== undefined) {
      // Всегда берем чистый исходный текст из кэша элемента
      const base = labelEl._baseText || labelEl.textContent;
      labelEl.textContent = shouldShowError ? `${base} — ${errorText}` : base;
    }
  }
}


/**
 * Оптимизированный селектор с виртуальным скроллом
 */
class CustomSelector extends CustomLabel {
  static optionSelectedClassName = 'option-selected';
  static optionDisabledClassName = 'option-disabled';
  static className = 'custom-selector-container';

  constructor(options = {}) {
    const {
      id = `sel-${Math.random().toString(36).substr(2, 9)}`,
      options: items = [],
      height = '300px',
      isMulti = true,
      label = '',
      isRequired = false,
      onchange,
      hasSearch = true,
      itemHeight = 40 // Фиксированная высота строки для вирт. скролла
    } = options;

    super({ label, isRequired });

    // Состояние
    this.id = id;
    this.allOptions = items; 
    this.filteredOptions = [...items];
    this.selectedValues = new Set();
    this.isMulti = isMulti;
    this.onchange = onchange;
    
    // Параметры виртуализации
    this.itemHeight = itemHeight;
    this.visibleCount = Math.ceil(parseInt(height) / itemHeight) + 1;

    // Элементы
    this.els = {
      container: document.createElement('div'),
      header: document.createElement('div'),
      search: hasSearch ? document.createElement('input') : null,
      list: document.createElement('ul'),
      spacer: document.createElement('div'), // Распорка для высоты
      pool: [] // Пул видимых строк
    };

    this.init();
  }

  async init() {
    const { container, header, search, list, spacer } = this.els;

    container.id = this.id;
    container.className = CustomSelector.className;

    // 1. Настройка структуры и стилей (Batch)
    await Promise.all([
      setStyleToEl({ display: 'flex', flexDirection: 'column', gap: '4px' }, container),
      setStyleToEl({ 
        position: 'relative', overflowY: 'auto', border: '1px solid #333', 
        height: `${this.visibleCount * this.itemHeight}px`, padding: '0', margin: '0',
        listStyle: 'none'
      }, list),
      setStyleToEl({ position: 'absolute', top: 0, left: 0, right: 0, zIndex: -1 }, spacer)
    ]);

    if (search) {
      search.placeholder = 'Поиск...';
      search.addEventListener('input', (e) => this.handleSearch(e.target.value));
      header.append(search);
    }

    // 2. Создаем пул DOM-узлов (только столько, сколько влезет в экран)
    for (let i = 0; i < this.visibleCount + 1; i++) {
      const li = document.createElement('li');
      setStyleToEl({
        position: 'absolute', left: 0, right: 0, height: `${this.itemHeight}px`,
        display: 'flex', alignItems: 'center', padding: '0 12px', cursor: 'pointer',
        boxSizing: 'border-box', borderBottom: '1px solid #eee', willChange: 'transform'
      }, li);
      
      this.els.pool.push(li);
      list.append(li);
    }

    list.append(spacer);
    container.append(this.el, header, list); // this.el - это Label из super()

    // 3. События
    list.addEventListener('scroll', () => requestAnimationFrame(() => this.updateVirtualList()));
    list.addEventListener('click', (e) => this.handleItemClick(e));

    this.refreshFullHeight();
    this.updateVirtualList();
  }

  // Обновляем высоту "фантомного" скролла
  refreshFullHeight() {
    this.els.spacer.style.height = `${this.filteredOptions.length * this.itemHeight}px`;
  }

  // Главная логика виртуализации
  updateVirtualList() {
    const scrollTop = this.els.list.scrollTop;
    const startIndex = Math.floor(scrollTop / this.itemHeight);
    
    this.els.pool.forEach((li, i) => {
      const dataIndex = startIndex + i;
      const data = this.filteredOptions[dataIndex];

      if (data) {
        li.style.transform = `translateY(${dataIndex * this.itemHeight}px)`;
        li.style.display = 'flex';
        li.textContent = data.name;
        li.dataset.value = data.value ?? data.id;
        
        // Подсветка выбранного
        const isSelected = this.selectedValues.has(li.dataset.value);
        li.classList.toggle(CustomSelector.optionSelectedClassName, isSelected);
        li.style.backgroundColor = isSelected ? '#e3f2fd' : '#fff';
      } else {
        li.style.display = 'none';
      }
    });
  }

  handleItemClick(e) {
    const li = e.target.closest('li');
    if (!li || li.style.display === 'none') return;

    const val = li.dataset.value;

    if (this.isMulti) {
      this.selectedValues.has(val) ? this.selectedValues.delete(val) : this.selectedValues.add(val);
    } else {
      this.selectedValues.clear();
      this.selectedValues.add(val);
    }

    this.updateVirtualList();
    if (this.onchange) this.onchange(Array.from(this.selectedValues));
  }

  handleSearch(text) {
    const term = text.toLowerCase();
    this.filteredOptions = this.allOptions.filter(opt => 
      opt.name.toLowerCase().includes(term)
    );
    
    this.refreshFullHeight();
    this.els.list.scrollTop = 0; // Сброс скролла при поиске
    this.updateVirtualList();
  }

  get element() {
    return this.els.container;
  }

  // Публичный метод для получения данных
  getSelected() {
    return Array.from(this.selectedValues);
  }
}

class CustomTextarea extends CustomLabel {
  static className = 'custom-textarea-container';

  /**
   * Быстрый доступ к данным без создания инстанса
   */
  static getData(container) {
    if (!container) return null;
    const textarea = container.querySelector('textarea');
    return textarea ? { el: textarea, value: textarea.value } : null;
  }

  constructor(options = {}) {
    const {
      id = '',
      value = '',
      label = 'Введите текст сообщения',
      rows = 4,
      containerClassName = '',
      className = '',
      style = {},
      containerStyle = {},
      isRequired = false,
      onchange = null,
      oninput = null
    } = options;

    super({ label, isRequired });

    // Props
    this.id = id;
    this._initialValue = value;
    this.rows = rows;
    this.onchange = onchange;
    this.oninput = oninput;

    // Elements
    this.els = {
      container: document.createElement('div'),
      textarea: document.createElement('textarea')
    };

    this.init(containerClassName, className, style, containerStyle);
  }

  init(containerClassName, className, style, containerStyle) {
    const { container, textarea } = this.els;

    // 1. Настройка контейнера
    container.id = this.id;
    container.className = [CustomTextarea.className, containerClassName].filter(Boolean).join(' ');
    
    // Группируем стили контейнера
    setStyleToEl({ 
      display: 'flex', 
      flexDirection: 'column', 
      gap: '4px',
      ...containerStyle 
    }, container);

    // 2. Настройка поля ввода
    textarea.rows = this.rows;
    textarea.value = this._initialValue;
    textarea.className = className;
    
    // Применяем стили только к textarea
    setStyleToEl(style, textarea);

    // 3. События через addEventListener (пассивные слушатели для скорости)
    this.setupEvents();

    // 4. Сборка (this.el — это label из CustomLabel)
    container.append(this.el, textarea);
  }

  setupEvents() {
    const { container, textarea } = this.els;

    // Очистка ошибки при наборе текста (oninput быстрее и отзывчивее onkeydown)
    textarea.addEventListener('input', (e) => {
      CustomLabel.setError(container, { hasError: false });
      if (this.oninput) this.oninput(e);
    });

    if (this.onchange) {
      textarea.addEventListener('change', (e) => this.onchange(e));
    }
  }

  get element() {
    return this.els.container;
  

  // Удобный метод для очистки или программной установки значения
  setValue(val) {
    this.els.textarea.value = val;
  }

  getValue() {
    return this.els.textarea.value;
  }
}


class CustomModal {
  static className = 'custom-modal-container';

  constructor(options = {}) {
    this.settings = {
      title: 'Заголовок',
      content: '',
      id: `modal-${Math.random().toString(36).substr(2, 9)}`,
      buttons: [],
      height: 'fit-content',
      width: 'fit-content',
      onClose: null,
      closeOnEsc: true,
      closeOnOverlay: false,
      ...options
    };

    this.init();
  }

  async init() {
    // 1. Создаем дерево элементов в памяти (без стилей пока)
    this.els = {
      container: document.createElement('div'),
      modal: document.createElement('div'),
      header: document.createElement('div'),
      main: document.createElement('div'),
      footer: document.createElement('div'),
      closeBtn: document.createElement('button')
    };

    this.assembleStructure();
    this.initEvents();
    
    // 2. Рендерим пустую структуру (Layout быстрый, так как нет тяжелых стилей)
    document.body.append(this.els.container);

    // 3. Массово применяем стили через rAF (один Reflow на всё)
    await this.applyAllStyles();
  }

  assembleStructure() {
    const { container, modal, header, main, footer, closeBtn } = this.els;
    
    container.id = this.settings.id;
    container.className = CustomModal.className;

    // Header
    const title = document.createElement('h3');
    title.textContent = this.settings.title;
    closeBtn.textContent = '×';
    closeBtn.className = 'close-btn';
    header.append(title, closeBtn);

    // Main
    if (this.settings.content instanceof HTMLElement) {
      main.append(this.settings.content);
    } else {
      main.innerHTML = this.settings.content;
    }

    // Footer (используем наш CustomButton если он доступен, или просто кнопки)
    this.settings.buttons.forEach(btnCfg => {
      const btn = document.createElement('button');
      btn.textContent = btnCfg.text;
      btn.onclick = btnCfg.onClick;
      footer.append(btn);
    });

    modal.append(header, main, footer);
    container.append(modal);
  }

  applyAllStyles() {
    const { container, modal, header, main, closeBtn } = this.els;

    // Все эти вызовы упадут в одну пачку (Batch) благодаря нашей setStyleToEl
    return Promise.all([
      setStyleToEl({
        position: 'fixed', top: 0, left: 0, width: '100vw', height: '100vh',
        zIndex: 1000, backgroundColor: 'rgba(0,0,0,0.4)', display: 'flex',
        alignItems: 'center', justifyContent: 'center'
      }, container),

      setStyleToEl({
        padding: '14px', backgroundColor: 'white', display: 'flex',
        flexDirection: 'column', gap: '8px', width: this.settings.width,
        height: this.settings.height, maxHeight: '90vh', borderRadius: '4px'
      }, modal),

      setStyleToEl({ position: 'relative', minHeight: '38px', paddingRight: '40px' }, header),
      setStyleToEl({ position: 'absolute', right: 0, top: 0, width: '38px', height: '38px' }, closeBtn),
      setStyleToEl({ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column', gap: '8px' }, main)
    ]);
  }

  initEvents() {
    this._handlers = {
      esc: (e) => e.key === 'Escape' && this.close(),
      overlay: (e) => e.target === this.els.container && this.close(),
      closeBtn: () => this.close()
    };

    this.els.closeBtn.addEventListener('click', this._handlers.closeBtn);
    if (this.settings.closeOnEsc) document.addEventListener('keydown', this._handlers.esc);
    if (this.settings.closeOnOverlay) this.els.container.addEventListener('click', this._handlers.overlay);
  }

  close() {
    if (this.settings.onClose?.()) return; // Если onClose вернул true, отменяем закрытие
    this.destroy();
  }

  destroy() {
    document.removeEventListener('keydown', this._handlers.esc);
    this.els.container.remove();
    // Очистка ссылок для GC
    Object.keys(this.els).forEach(key => this.els[key] = null);
  }
}
