<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <meta
    name="description"
    content=""
  >
  <title>Constructor</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    
    .editModal {
        display: none;
        position: fixed;
        flex-direction: column;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        
        &.show {
            display: flex;
        }
        
        .header {
            display: flex;
            width: 100vw;
            height: 32px;
            overflow-x: auto;
            
            div {
                color: red;
                &::before {
                    content: '/';
                }
            }
        }
        
        .main {
            display: flex;
            height: calc(100vh - 32px);
            overflow-y: auto;
        }
    }

    header {
      height: 32px;
    }

    main {
      height: calc(100vh - 32px);
      width: 100vw;
      position: relative;
    }
    
    .editMode {
        .cell{
            border: 1px solid black;

            &.selected {
              border-color: red;
            }
        }
    }

    .cell {
      position: fixed;
    }

    .level {
      width: 32px;
    }
  </style>
</head>

<body>
    <div id="editModal" class="editModal">
        <div class="header">
            <div>main</div>
        </div>
        <div class="main">
            
        </div>
    </div>
  <main id="main"></main>
  <footer>
    <input
      onchange="changeMenu(this)"
      list="menuList"
      id="menuInput"
    >
    <datalist id="menuList">
      <option value="verticalSlice">
      <option value="horizontalSlice">
      <option value="join">
      <option value="edit">
      <option value="unselectAll">
    </datalist>
    <input
      class="level"
      type="number"
      id="level"
      value="1"
    />
    <button onclick="toggleEditModal()">Menu</button>
  </footer>

  <script>
    const main = document.getElementById('main');
    const level = document.getElementById('level');
    maxDiff = 1
    maxId = 1
    
    
    toggleMainClick(true);
    main.append(createCell({
        id: maxId,
        width: main.clientWidth - 2,
        height: main.clientHeight - 2,
        left: 0,
        top: 0
    }))
    toggleEditMode()
    
    function getPx(value){
        return `${parseFloat(value)}px`
    }
    
    function toggleEditMode(){
        document.body.classList.toggle('editMode')
    }

    function toggleMainClick(enable) {
      const action = enable ? 'addEventListener' : 'removeEventListener';
      main[action]('click', selectCell);
    }

    function getLevel() {
      return +level.value;
    }
    
    function toggleEditModal(){
        editModal.classList.toggle('show')
        editModal.style.zIndex = maxId + 1
    }
    
    function preciseMath(a, b, operation, precision = 10) {
        // Проверка на деление на ноль
        if (operation === '/' && b === 0) {
            throw new Error('Деление на ноль');
        }
    
        let result;
        switch(operation) {
            case '+':
                result = a + b;
                break;
            case '-':
                result = a - b;
                break;
            case '*':
                result = a * b;
                break;
            case '/':
                result = a / b;
                break;
        }

        // Округляем результат
        const factor = Math.pow(10, precision);
        return Math.round(result * factor) / factor;
    }
   
    function createCell({
        zIndex,
        id,
        width,
        height,
        top,
        left,
    }){
        return createEl({
            className: 'cell',
            datasets: [{ value: id, name: 'id' }],
            style: {
                top: getPx(top),
                left: getPx(left),
                height: getPx(height),
                width: getPx(width),
                ['z-index']: zIndex ?? id
            }
          })
    }

    function getCellInfo(element) {
      info = {
          top: parseFloat(element.style.top),
          left: parseFloat(element.style.left),
          width: parseFloat(element.style.width),
          height: parseFloat(element.style.height),
      }
      
      return {
          ...info,
          bottom: preciseMath(info.top, info.height, '+'),
          right: preciseMath(info.left, info.width, '+'),
          id: +element.dataset.id
      }
    }

    function getCells() {
      return main.querySelectorAll('.cell')
    }

    function selectCell(event) {
      const el = event.target;

      if (el.classList.contains('cell')) {
        el.classList.toggle('selected');
      }
    }

    function splitCell({ direction, selectedCell, place = 'before', selectedCells }) {
      const isHorizontal = direction === 'horizontalSlice';
      const isVertical = direction === 'verticalSlice'

      const fragment = document.createDocumentFragment();
      const newIds = getNewIds();
      
      const { width,height,top,left } = getCellInfo(selectedCell)
        
      calcWidth = isVertical ? preciseMath(width, newIds.length+1, '/') : width
      calcHeight = isHorizontal ? preciseMath(height, newIds.length+1, '/') : height

      newIds.forEach((id, index) => {
          calcLeft = isVertical ? preciseMath(preciseMath(index,calcWidth,'*'),left, '+') : left
          calcTop = isHorizontal ? preciseMath(preciseMath(calcHeight,index,'*'),top, '+') : top
          fragment.append(createCell({
              id,
              width: calcWidth,
              height: calcHeight,
              top: calcTop,
              left: calcLeft
         }));
      });

      selectedCell.style.width = getPx(calcWidth)
      selectedCell.style.height = getPx(calcHeight)
      selectedCell.style.left = getPx(isVertical ? preciseMath(preciseMath(preciseMath(calcWidth, newIds.length,'*'),left, '+'), 1, '+') : left)
      selectedCell.style.top = getPx(isHorizontal ? preciseMath(preciseMath(preciseMath(calcHeight, newIds.length,'*'), top, '+'),1,'+') : top)

      selectedCell[place](fragment);
    }

    function getCellId(cellEl) {
      const idString = +cellEl.dataset.id;
    }

    function getNewIds() {
      const from = maxId + maxDiff;
      const sliceCount = getLevel() - maxDiff;
      newMax = from + sliceCount
      maxId = newMax
      return rangeArray({ from, to: newMax });
    }
    
    function editCell(selectedCells) {
        cell = selectedCells[0]
        cell.contentEditable = cell.contentEditable === 'true' ? 'false' : 'true'
        cell.focus()
    }
    
    function joinCells(selectedCells) {
        newLeft = null
          newTop = null
          newBottom = 0
          newRight = 0
          newId = 0
          leftEl = null
          rightEl = null
          
          selectedCells.forEach(selectedCell => {
              const { id, width, height, top, left, right, bottom } = getCellInfo(selectedCell)
              
              if(newId < id) {
                  newId = id
              }
              if(newLeft > left || newLeft === null) {
                  newLeft = left
                  el = selectedCell
              }
              if(newRight < right) newRight = right
              if(newTop > top || newTop === null) newTop = top
              if(newBottom < bottom) newBottom = bottom
          })
          newWidth = newRight - newLeft
          newHeight = newBottom - newTop
          
          getCells().forEach(cell => {
              const { left, right, top, bottom, id } = getCellInfo(cell)
              
              isInLeft = newLeft - maxDiff < left
              isInRight = newRight + maxDiff > right
              isInTop = newTop - maxDiff < top
              isInBottom = newBottom + maxDiff > bottom
              
              if(isInBottom && isInTop && isInRight && isInLeft) {
                  if (newId > id) newId = id
                  
                  cell.remove()
              }
          })
          
          main.append(createCell({
              id: newId,
              left: newLeft,
              top: newTop,
              width: newWidth,
              height: newHeight,
          }))
    }

    function changeMenu(menuEl) {
      menuEl.blur()
      const { value } = menuEl;
      const selectedCells = getSelectedCells();

      if (value === 'verticalSlice' || value === 'horizontalSlice') {
        selectedCells.forEach((selectedCell) => splitCell({ direction: value, selectedCell, selectedCells }));
      } else if (value === 'unselectAll') {
        selectedCells.forEach(selectedCell => selectedCell.classList.toggle('selected'));
      } else if (value === 'join') {
        joinCells(selectedCells)
      } else if(value === 'edit') {
        editCell(selectedCells)
      } else if(value === 'editMode'){
          toggleEditMode()
      }

      menuEl.value = '';
    }

    function getSelectedCells() {
      return Array.from(document.querySelectorAll('.selected'));
    }

    function createEl({ elName = 'div', className = '', type = '', datasets, innerHTML = '', style = {}, appendTo = '' }) {
      const el = document.createElement(elName);
      if (className) el.className = className;
      if (datasets) datasets.forEach(({ value, name }) => el.dataset[name] = value)
      if (type) el.type = type;
      if (style) Object.keys(style).forEach(styleKey => {
        el.style[styleKey] = style[styleKey]
      })
      if (innerHTML) el.innerHTML = innerHTML;
      if (appendTo) document.querySelector(appendTo).append(el);
      return el;
    }

    function rangeArray({ from = 0, to = 0, before = '', handler }) {
      const newArray = [];
      for (let index = from; index <= to; index++) {
        let value = `${before}${index}`;
        handler?.(value, index);
        newArray.push(value);
      }
      return newArray;
    }

    function compare(id1, id2) {
      return String(id1) === String(id2);
    }

    function log() {
      for (var i = 0; i < arguments.length; i++) {
        console.log(arguments[i])
      }
    }
  </script>
</body>

</html>
